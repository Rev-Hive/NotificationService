server:
  port: 8085

spring:

  application:
    name: NOTIFICATION-SERVICE

  datasource:
    url: jdbc:mysql://mysql:3306/revhive_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 2022
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      fail-on-empty-beans: false

eureka:

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://service-registry:8761/eureka

  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.web.socket: DEBUG
    org.hibernate.SQL: DEBUG