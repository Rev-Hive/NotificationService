server:
  port: 8088

spring:

  application:
    name: NOTIFICATION-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/revhive_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: sourav
    password: sourav@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      fail-on-empty-beans: false

eureka:

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.web.socket: DEBUG
    org.hibernate.SQL: DEBUG
